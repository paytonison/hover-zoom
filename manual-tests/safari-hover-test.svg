<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220" role="img" aria-labelledby="title desc">
  <title id="title">Safari SVG hover test</title>
  <desc id="desc">A self-contained SVG fixture with gradients, transparency, text, and crisp vector shapes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#64d2ff"/>
      <stop offset="1" stop-color="#30d158"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#fff" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="checker" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#f2f2f7"/>
      <rect width="8" height="8" fill="#d1d1d6"/>
      <rect x="8" y="8" width="8" height="8" fill="#d1d1d6"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="320" height="220" rx="22" fill="url(#checker)"/>
  <rect x="14" y="14" width="292" height="192" rx="18" fill="url(#sky)" filter="url(#softShadow)"/>
  <rect x="14" y="14" width="292" height="192" rx="18" fill="url(#glow)"/>

  <g transform="translate(160 104)">
    <circle r="54" fill="#fff" fill-opacity="0.2"/>
    <path d="M-68 38 L-24 -46 L12 12 L34 -22 L70 38 Z" fill="#fff" fill-opacity="0.94"/>
    <circle cx="44" cy="-42" r="15" fill="#ffcc00"/>
    <path d="M-86 58 C-42 36 -4 82 38 54 C58 42 74 44 90 58" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.72"/>
  </g>

  <g transform="translate(32 166)">
    <rect width="256" height="32" rx="9" fill="#1c1c1e" fill-opacity="0.56"/>
    <text x="128" y="21" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#fff">SVG HOVER TEST</text>
  </g>

  <path d="M24 44 H100 M24 58 H78" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-opacity="0.72"/>
  <circle cx="276" cy="44" r="10" fill="#ff453a"/>
  <circle cx="276" cy="74" r="10" fill="#ffd60a"/>
  <circle cx="276" cy="104" r="10" fill="#32d74b"/>
</svg>
